# Mise's cask installer cannot currently unpack these legacy cask artifact
# types: cscreen, mdimagesizemdimporter, miniforge, qlimagesize, redis-stack-server.

[bootstrap.repos]
"~/projects/dotfiles" = { url = "https://github.com/sarendipitee/dotfiles.git", ref = "main" }

[bootstrap.hooks.post-repos]
run = '''
PATH="/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:$PATH" \
  bash "$HOME/projects/dotfiles/scripts/create-links.sh" --backup-known-conflicts
'''

[bootstrap.user]
login_shell = "/bin/zsh"

[tasks.bootstrap]
description = "Configure privileged services and machine-specific state"
run = 'bash "$HOME/projects/dotfiles/scripts/bootstrap-system.sh"'
