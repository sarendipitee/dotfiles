version: "0.5"
is_strict: true

processes:
  eternal-terminal:
    description: Eternal Terminal server
    command: exec etserver --port 2022 --logtostdout
    availability:
      restart: always
      backoff_seconds: 5

  omniroute:
    description: OmniRoute server
    command: exec ${HOME}/.local/bin/dotfiles-omniroute serve --no-open --no-recovery
    environment:
      - "DATA_DIR=${XDG_STATE_HOME}/omniroute"
      - "OMNIROUTE_SERVER_HOST=0.0.0.0"
    availability:
      restart: always
      backoff_seconds: 5
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 20128
        path: /api/monitoring/health
      initial_delay_seconds: 5
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

  codex-remote-control:
    description: Codex remote-control server
    command: exec ${HOME}/.local/bin/dotfiles-codex-remote-control
    availability:
      restart: on_failure
      backoff_seconds: 5
    shutdown:
      signal: 2
      timeout_seconds: 10

  hindsight:
    description: Hindsight server
    command: exec /usr/bin/docker run --rm --name hindsight --pull always --env-file ${HOME}/.config/hindsight/hindsight.env -p 127.0.0.1:18888:8888 -p 127.0.0.1:19999:9999 -v ${HOME}/.local/share/hindsight:/home/hindsight/.pg0 ghcr.io/vectorize-io/hindsight:latest
    availability:
      restart: always
      backoff_seconds: 10
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 18888
        path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    shutdown:
      command: /usr/bin/docker stop -t 30 hindsight
      timeout_seconds: 40

  vllm:
    description: vLLM OpenAI-compatible inference server
    command: exec ${HOME}/.local/bin/dotfiles-vllm-docker
    availability:
      restart: always
      backoff_seconds: 10
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 8080
        path: /v1/models
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    shutdown:
      command: /usr/bin/docker stop -t 120 vllm
      timeout_seconds: 130

  nanoclaw:
    description: NanoClaw and OneCLI stack
    command: exec ${HOME}/.local/bin/dotfiles-nanoclaw-compose
    availability:
      restart: always
      backoff_seconds: 10
