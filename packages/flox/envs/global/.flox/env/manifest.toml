# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
# on-activate = '''
#   # -> Set variables, create files and directories
#   # -> Perform initialization steps, e.g. create a python venv
#   # -> Useful environment variables:
#   #      - FLOX_ENV_PROJECT=/home/user/example
#   #      - FLOX_ENV=/home/user/example/.flox/run
#   #      - FLOX_ENV_CACHE=/home/user/example/.flox/cache
# '''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
common = '''
  _flox_prepend_path_once() {
    _flox_var_name="$1"
    _flox_path_value="$2"
    eval "_flox_current_value=\${$_flox_var_name:-}"
    case ":$_flox_current_value:" in
      *":$_flox_path_value:"*) ;;
      *)
        if [ -n "$_flox_current_value" ]; then
          export "$_flox_var_name=$_flox_path_value:$_flox_current_value"
        else
          export "$_flox_var_name=$_flox_path_value"
        fi
        ;;
    esac
  }

  if [ -n "${FLOX_ENV:-}" ]; then
    if [ -d "$FLOX_ENV/include" ]; then
      _flox_prepend_path_once CPATH "$FLOX_ENV/include"
    fi
    if [ -d "$FLOX_ENV/lib" ]; then
      _flox_prepend_path_once LIBRARY_PATH "$FLOX_ENV/lib"
      # Mirror into LD_LIBRARY_PATH so libraries the linker picked from this
      # env (via LIBRARY_PATH) also resolve at runtime. Without this, a
      # system compiler links an env-provided lib (e.g. icu4c) that the
      # default loader path can't find, and binaries crash with
      # "cannot open shared object file". This env's lib dir is curated and
      # contains no glibc/loader, so it is safe on LD_LIBRARY_PATH.
      _flox_prepend_path_once LD_LIBRARY_PATH "$FLOX_ENV/lib"
    fi
    if [ -d "$FLOX_ENV/lib/pkgconfig" ]; then
      _flox_prepend_path_once PKG_CONFIG_PATH "$FLOX_ENV/lib/pkgconfig"
    fi
  fi
  unset -f _flox_prepend_path_once
  unset _flox_var_name _flox_path_value _flox_current_value
'''


