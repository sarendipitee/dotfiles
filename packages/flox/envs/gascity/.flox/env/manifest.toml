schema-version = "1.11.0"

[profile]
common = '''
  _GC_VERSION="1.2.1"
  _GC_BIN="$HOME/.local/bin/gc"

  if [ ! -x "$_GC_BIN" ] && command -v curl &>/dev/null; then
    _ARCH="$(uname -m)"
    _OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
    case "$_OS" in linux*) _OS="linux" ;; darwin*) _OS="darwin" ;; esac
    case "$_ARCH" in
      x86_64|amd64) _ARCH="amd64" ;;
      aarch64|arm64) _ARCH="arm64" ;;
    esac

    _GC_TMP="$(mktemp -d)"
    curl -sL "https://github.com/gastownhall/gascity/releases/download/v${_GC_VERSION}/gascity_${_GC_VERSION}_${_OS}_${_ARCH}.tar.gz" \
      | tar -xz -C "$_GC_TMP" 2>/dev/null
    mv "$_GC_TMP/gc" "$_GC_BIN" 2>/dev/null && chmod +x "$_GC_BIN" 2>/dev/null
    rm -rf "$_GC_TMP"
    unset _GC_TMP _ARCH _OS
  fi
  unset _GC_VERSION _GC_BIN
  # remove omz git gc alis
  unalias gc 2>/dev/null
'''

[options]
systems = ["aarch64-darwin", "x86_64-linux"]
