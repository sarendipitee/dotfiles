schema-version = "1.11.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
# Core CLI Tools
age.pkg-path = "age"
bat.pkg-path = "bat"
cloc.pkg-path = "cloc"
commitizen.pkg-path = "commitizen"
eza.pkg-path = "eza"
fd.pkg-path = "fd"
fzf.pkg-path = "fzf"
gh.pkg-path = "gh"
git.pkg-path = "gitFull"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"
tmux.pkg-path = "tmux"
tree.pkg-path = "tree"
uv.pkg-path = "uv"
pipx.pkg-path = "pipx"
watchexec.pkg-path = "watchexec"
yazi.pkg-path = "yazi"
yq.pkg-path = "yq"
yt-dlp.pkg-path = "yt-dlp"
zoxide.pkg-path = "zoxide"
thefuck.pkg-path = "thefuck"
shellcheck.pkg-path = "shellcheck"
semgrep.pkg-path = "semgrep"
httpie.pkg-path = "httpie"
htop.pkg-path = "htop"
mosh.pkg-path = "mosh"
neovim = { pkg-path = "neovim", version = "0.12.2", pkg-group = "neovim" }

# Dev/Ops Tools
awscli.pkg-path = "awscli"
caddy.pkg-path = "caddy"
cmake.pkg-path = "cmake"
ffmpeg.pkg-path = "ffmpeg"
gcc.pkg-path = "gcc"
go.pkg-path = "go"
kubectl.pkg-path = "kubectl"
k9s.pkg-path = "k9s"
terraform.pkg-path = "terraform"
kubernetes-helm.pkg-path = "kubernetes-helm"
kustomize.pkg-path = "kustomize"
k3d.pkg-path = "k3d"
kind.pkg-path = "kind"
stern.pkg-path = "stern"
ctop.pkg-path = "ctop"
argo.pkg-path = "argo"
argocd.pkg-path = "argocd"
stow.pkg-path = "stow"

# Custom Tap Packages (via nixpkgs flake)
opencode.flake = "github:NixOS/nixpkgs/nixos-unstable#opencode"
dyff.flake = "github:NixOS/nixpkgs/nixos-unstable#dyff"
talosctl.flake = "github:NixOS/nixpkgs/nixos-unstable#talosctl"
supabase-cli.flake = "github:NixOS/nixpkgs/nixos-unstable#supabase-cli"
stripe-cli.flake = "github:NixOS/nixpkgs/nixos-unstable#stripe-cli"

# Python
python311.pkg-path = "python311"

# Rust tooling
rustup.pkg-path = "rustup"

# Nerd Fonts (open-source variants available in nixpkgs)
nerd-font-fira-code.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.fira-code"
nerd-font-jetbrains-mono.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.jetbrains-mono"
nerd-font-hack.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.hack"
nerd-font-roboto-mono.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.roboto-mono"
nerd-font-meslo-lg.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.meslo-lg"
nerd-font-ubuntu.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.ubuntu"
nerd-font-ubuntu-mono.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.ubuntu-mono"
nerd-font-victor-mono.flake = "github:NixOS/nixpkgs/nixos-unstable#nerd-fonts.victor-mono"
_1password-cli.pkg-path = "_1password-cli"
_1password.pkg-path = "_1password"

## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
# on-activate = '''
#   # -> Set variables, create files and directories
#   # -> Perform initialization steps, e.g. create a python venv
#   # -> Useful environment variables:
#   #      - FLOX_ENV_PROJECT=/home/user/example
#   #      - FLOX_ENV=/home/user/example/.flox/run
#   #      - FLOX_ENV_CACHE=/home/user/example/.flox/cache
# '''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# myservice.command = "python3 -m http.server"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


## Build and publish your own packages ------------------------------
##  $ flox build
##  $ flox publish
## ------------------------------------------------------------------
[build]
# [build.myproject]
# description = "The coolest project ever"
# version = "0.0.1"
# command = """
#   mkdir -p $out/bin
#   cargo build --release
#   cp target/release/myproject $out/bin/myproject
# """


## Other Environment Options -----------------------------------------
[options]
systems = ["aarch64-darwin", "x86_64-linux"]
# Systems that environment is compatible with
# systems = [
#   "aarch64-darwin",
#   "aarch64-linux",
#   "x86_64-darwin",
#   "x86_64-linux",
# ]
# Uncomment to disable CUDA detection.
# cuda-detection = false
