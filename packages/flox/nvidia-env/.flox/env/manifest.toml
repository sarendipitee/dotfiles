schema-version = "1.11.0"

[install]
ollama.pkg-path = "ollama"
vllm.pkg-path = "flox-cuda/python3Packages.vllm"
vllm.pkg-group = "vllm"
cudatoolkit.pkg-path = "cudatoolkit"
nvidia-container-toolkit.pkg-path = "nvidia-container-toolkit"

[profile]
common = '''
  _FLOX_CUDA_LIB_DIR="$HOME/.local/share/flox-cuda-lib"
  if [ -d "$_FLOX_CUDA_LIB_DIR" ]; then
    export LD_LIBRARY_PATH="${_FLOX_CUDA_LIB_DIR}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
  fi
  unset _FLOX_CUDA_LIB_DIR
'''

[options]
systems = ["x86_64-linux"]
